<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" role="img" aria-labelledby="icon-title icon-desc">
  <title id="icon-title">Lock Open</title>
  <desc id="icon-desc">越权/突破图标：打开的锁</desc>

  <!-- 锁体 -->
  <rect x="5" y="10" width="14" height="12" rx="2" fill="none" stroke="#fbbf24" stroke-width="2" />

  <!-- 锁梁（打开状态） -->
  <path d="M8 10 L8 7 A4 4 0 0 1 16 7 L16 9" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" />

  <!-- 锁孔 -->
  <circle cx="12" cy="16" r="1.5" fill="#fbbf24" />
  <line x1="12" y1="17.5" x2="12" y2="19" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" />
</svg>
