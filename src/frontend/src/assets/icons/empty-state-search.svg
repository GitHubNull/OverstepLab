<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="empty-title empty-desc">
  <title id="empty-title">Search Empty State</title>
  <desc id="empty-desc">搜索无结果状态插画：放大镜与六边形</desc>

  <defs>
    <linearGradient id="grad-search" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="#0c0c0c" rx="20" />

  <!-- 六边形轮廓 -->
  <path d="M100 40 L170 80 L170 140 L100 180 L30 140 L30 80 Z" fill="none" stroke="url(#grad-search)" stroke-width="2" stroke-linejoin="round" />

  <!-- 放大镜 -->
  <g transform="translate(100, 110)">
    <circle cx="0" cy="-4" r="18" fill="none" stroke="#6366f1" stroke-width="2" />
    <line x1="12" y1="10" x2="22" y2="20" stroke="#6366f1" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- 问号 -->
  <text x="100" y="108" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#818cf8">?</text>

  <text x="100" y="195" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="500" fill="#4b5563">NO RESULTS</text>
</svg>
