<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" role="img" aria-labelledby="icon-title icon-desc">
  <title id="icon-title">Terminal</title>
  <desc id="icon-desc">命令/控制台图标：终端窗口</desc>

  <!-- 窗口外框 -->
  <rect x="2" y="4" width="20" height="16" rx="2" fill="none" stroke="#818cf8" stroke-width="2" />

  <!-- 标题栏 -->
  <line x1="2" y1="8" x2="22" y2="8" stroke="#818cf8" stroke-width="1.5" />

  <!-- 窗口按钮 -->
  <circle cx="5" cy="6" r="1" fill="#fb7185" />
  <circle cx="8" cy="6" r="1" fill="#fbbf24" />
  <circle cx="11" cy="6" r="1" fill="#34d399" />

  <!-- 命令提示符 -->
  <text x="5" y="17" font-family="'JetBrains Mono', monospace" font-size="7" font-weight="600" fill="#34d399">$</text>
  <line x1="10" y1="15" x2="18" y2="15" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round" />
</svg>
