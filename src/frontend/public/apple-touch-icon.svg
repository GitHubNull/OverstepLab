<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img" aria-labelledby="favicon-title favicon-desc">
  <title id="favicon-title">OverstepLab Apple Touch Icon</title>
  <desc id="favicon-desc">OverstepLab iOS设备触摸图标</desc>

  <defs>
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-breakthrough" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow-small" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="180" height="180" fill="#0a0a0a" rx="36" />

  <!-- 外六边形 -->
  <path d="M90 18 L162 60 L162 120 L90 162 L18 120 L18 60 Z" fill="none" stroke="url(#grad-primary)" stroke-width="4" stroke-linejoin="round" filter="url(#glow-small)" />

  <!-- 中间六边形 -->
  <path d="M90 36 L144 68 L144 112 L90 144 L36 112 L36 68 Z" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linejoin="round" opacity="0.6" />

  <!-- 内六边形 -->
  <path d="M90 54 L126 76 L126 104 L90 126 L54 104 L54 76 Z" fill="none" stroke="#6366f1" stroke-width="2" stroke-linejoin="round" opacity="0.4" />

  <!-- 突破光带 -->
  <path d="M60 120 L120 60" stroke="url(#grad-breakthrough)" stroke-width="6" stroke-linecap="round" filter="url(#glow-small)" />
  <path d="M60 120 L120 60" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round" opacity="0.8" />

  <!-- 中心锁形 -->
  <g transform="translate(90, 92)">
    <rect x="-14" y="-4" width="28" height="22" rx="4" fill="none" stroke="#818cf8" stroke-width="3" />
    <path d="M-10 -4 L-10 -14 A10 10 0 0 1 10 -14 L10 -4" fill="none" stroke="#818cf8" stroke-width="3" stroke-linecap="round" />
    <circle cx="0" cy="7" r="3" fill="#a5b4fc" />
    <rect x="-1.5" y="7" width="3" height="6" rx="1" fill="#a5b4fc" />
  </g>

  <!-- 装饰点 -->
  <circle cx="90" cy="18" r="2.5" fill="#818cf8" opacity="0.8" />
  <circle cx="90" cy="162" r="2.5" fill="#818cf8" opacity="0.8" />
</svg>
