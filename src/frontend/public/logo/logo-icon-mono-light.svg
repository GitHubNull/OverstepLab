<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">OverstepLab Logo Mono Light</title>
  <desc id="logo-desc">OverstepLab 单色浅色版本Logo，适用于深色背景</desc>

  <defs>
    <path id="hex-outer" d="M256 48 L448 160 L448 352 L256 464 L64 352 L64 160 Z" />
    <path id="hex-mid" d="M256 96 L400 184 L400 328 L256 416 L112 328 L112 184 Z" />
    <path id="hex-inner" d="M256 144 L352 200 L352 312 L256 368 L160 312 L160 200 Z" />
  </defs>

  <!-- 无背景，透明 -->

  <!-- 外六边形 -->
  <use href="#hex-outer" fill="none" stroke="#f0f0f0" stroke-width="10" stroke-linejoin="round" />

  <!-- 中间六边形 -->
  <use href="#hex-mid" fill="none" stroke="#d1d5db" stroke-width="5" stroke-linejoin="round" opacity="0.7" />

  <!-- 内六边形 -->
  <use href="#hex-inner" fill="none" stroke="#9ca3af" stroke-width="4" stroke-linejoin="round" opacity="0.5" />

  <!-- 突破光带 -->
  <path d="M180 340 L340 180" stroke="#f0f0f0" stroke-width="14" stroke-linecap="round" />
  <path d="M180 340 L340 180" stroke="#e5e7eb" stroke-width="4" stroke-linecap="round" opacity="0.7" />

  <!-- 中心锁形 -->
  <g transform="translate(256, 260)">
    <rect x="-28" y="-8" width="56" height="44" rx="8" fill="none" stroke="#f0f0f0" stroke-width="5" />
    <path d="M-20 -8 L-20 -28 A20 20 0 0 1 20 -28 L20 -8" fill="none" stroke="#f0f0f0" stroke-width="5" stroke-linecap="round" />
    <circle cx="0" cy="14" r="6" fill="#d1d5db" />
    <rect x="-3" y="14" width="6" height="12" rx="2" fill="#d1d5db" />
  </g>

  <!-- 装饰点 -->
  <circle cx="256" cy="48" r="5" fill="#f0f0f0" />
  <circle cx="448" cy="160" r="4" fill="#d1d5db" opacity="0.7" />
  <circle cx="64" cy="352" r="4" fill="#d1d5db" opacity="0.7" />
  <circle cx="256" cy="464" r="5" fill="#f0f0f0" />

  <!-- 底部小字 -->
  <text x="256" y="490" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#9ca3af" letter-spacing="3">OVERSTEP</text>
</svg>
