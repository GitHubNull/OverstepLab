<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">OverstepLab Full Logo Vertical</title>
  <desc id="logo-desc">OverstepLab 越权测试靶场竖排完整Logo：图标在上文字在下</desc>

  <defs>
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="grad-breakthrough" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#a5b4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:0.6" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 图标区域 (上方) -->
  <g transform="translate(44, 20) scale(0.6)">
    <rect width="512" height="512" fill="#0a0a0a" rx="80" />
    <path d="M256 48 L448 160 L448 352 L256 464 L64 352 L64 160 Z" fill="none" stroke="url(#grad-primary)" stroke-width="8" stroke-linejoin="round" filter="url(#glow)" />
    <path d="M256 96 L400 184 L400 328 L256 416 L112 328 L112 184 Z" fill="none" stroke="#4f46e5" stroke-width="4" stroke-linejoin="round" opacity="0.6" />
    <path d="M256 144 L352 200 L352 312 L256 368 L160 312 L160 200 Z" fill="none" stroke="#6366f1" stroke-width="3" stroke-linejoin="round" opacity="0.4" />
    <path d="M180 340 L340 180" stroke="url(#grad-breakthrough)" stroke-width="14" stroke-linecap="round" filter="url(#glow)" opacity="0.95" />
    <path d="M180 340 L340 180" stroke="#c7d2fe" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <g transform="translate(256, 260)">
      <rect x="-28" y="-8" width="56" height="44" rx="8" fill="none" stroke="#818cf8" stroke-width="5" />
      <path d="M-20 -8 L-20 -28 A20 20 0 0 1 20 -28 L20 -8" fill="none" stroke="#818cf8" stroke-width="5" stroke-linecap="round" />
      <circle cx="0" cy="14" r="6" fill="#a5b4fc" />
      <rect x="-3" y="14" width="6" height="12" rx="2" fill="#a5b4fc" />
    </g>
    <circle cx="256" cy="48" r="5" fill="#818cf8" opacity="0.8" />
    <circle cx="256" cy="464" r="5" fill="#818cf8" opacity="0.8" />
  </g>

  <!-- 文字区域 (下方) -->
  <g transform="translate(200, 360)" text-anchor="middle">
    <text x="0" y="0" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="42" font-weight="700" fill="#f0f0f0" letter-spacing="-1">Overstep<tspan fill="#818cf8">Lab</tspan></text>
    <text x="0" y="35" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="500" fill="#6366f1" letter-spacing="3">越权测试靶场</text>
    <line x1="-80" y1="55" x2="80" y2="55" stroke="#4f46e5" stroke-width="2" opacity="0.5" />
  </g>
</svg>
