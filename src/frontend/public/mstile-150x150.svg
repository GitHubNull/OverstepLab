<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="150" height="150" role="img" aria-labelledby="favicon-title favicon-desc">
  <title id="favicon-title">OverstepLab MS Tile Icon</title>
  <desc id="favicon-desc">OverstepLab Windows磁贴图标 150x150</desc>

  <defs>
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-breakthrough" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow-small" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="150" height="150" fill="#0a0a0a" />
  <path d="M75 15 L135 50 L135 100 L75 135 L15 100 L15 50 Z" fill="none" stroke="url(#grad-primary)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow-small)" />
  <path d="M75 30 L120 56 L120 94 L75 120 L30 94 L30 56 Z" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linejoin="round" opacity="0.6" />
  <path d="M75 45 L105 62 L105 88 L75 105 L45 88 L45 62 Z" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linejoin="round" opacity="0.4" />
  <path d="M50 100 L100 50" stroke="url(#grad-breakthrough)" stroke-width="5" stroke-linecap="round" filter="url(#glow-small)" />
  <path d="M50 100 L100 50" stroke="#c7d2fe" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
  <g transform="translate(75, 77)">
    <rect x="-11" y="-3" width="22" height="17" rx="3" fill="none" stroke="#818cf8" stroke-width="2.5" />
    <path d="M-8 -3 L-8 -11 A8 8 0 0 1 8 -11 L8 -3" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" />
    <circle cx="0" cy="5" r="2.5" fill="#a5b4fc" />
    <rect x="-1" y="5" width="2" height="4" rx="0.5" fill="#a5b4fc" />
  </g>
  <circle cx="75" cy="15" r="2" fill="#818cf8" opacity="0.8" />
  <circle cx="75" cy="135" r="2" fill="#818cf8" opacity="0.8" />
</svg>
