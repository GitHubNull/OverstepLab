name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: src/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd src/frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd src/frontend && pnpm build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/backend/go.mod
          cache-dependency-path: src/backend/go.sum

      - name: Resolve tag
        id: tag
        run: echo "name=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build Linux amd64
        run: |
          cd src/backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o ../../dist/oversteplab-${{ steps.tag.outputs.name }}-linux-amd64 ./cmd/server/

      - name: Build Linux arm64
        run: |
          cd src/backend
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" \
            -o ../../dist/oversteplab-${{ steps.tag.outputs.name }}-linux-arm64 ./cmd/server/

      - name: Build Windows amd64
        run: |
          cd src/backend
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o ../../dist/oversteplab-${{ steps.tag.outputs.name }}-windows-amd64.exe ./cmd/server/

      - name: Package source code
        run: |
          git archive --format=zip --output dist/oversteplab-${{ steps.tag.outputs.name }}-source.zip HEAD

      - name: Generate SHA256SUMS
        run: (cd dist && sha256sum * > SHA256SUMS)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*
          retention-days: 1

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Resolve tag
        id: tag
        run: echo "name=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          chmod +x .github/scripts/gen-release-notes.sh
          bash .github/scripts/gen-release-notes.sh "${{ steps.tag.outputs.name }}" > release_notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: release_notes.md
          files: dist/*
          prerelease: ${{ contains(steps.tag.outputs.name, '-rc') || contains(steps.tag.outputs.name, '-beta') || contains(steps.tag.outputs.name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
