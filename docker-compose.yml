services:
  oversteplab:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - OVERSTEPLAB_PORT=5000
      - OVERSTEPLAB_DB_PATH=/app/data/oversteplab.db
      - OVERSTEPLAB_SAFE_MODE=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
