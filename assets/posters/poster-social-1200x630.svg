<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="poster-title poster-desc">
  <title id="poster-title">OverstepLab 越权测试靶场宣传海报</title>
  <desc id="poster-desc">OverstepLab项目推广海报：深色科技风格，展示13个越权漏洞场景，包含水平越权、垂直越权、上下文越权三大类别</desc>

  <defs>
    <!-- 主渐变 -->
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>

    <!-- 突破光带渐变 -->
    <linearGradient id="grad-break" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#a5b4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:0.6" />
    </linearGradient>

    <!-- 径向光晕 -->
    <radialGradient id="radial-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0" />
    </radialGradient>

    <!-- 网格图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(99,102,241,0.08)" stroke-width="1" />
    </pattern>

    <!-- 发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glow-small" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- 六边形路径 -->
    <path id="hex-outer" d="M256 48 L448 160 L448 352 L256 464 L64 352 L64 160 Z" />
    <path id="hex-mid" d="M256 96 L400 184 L400 328 L256 416 L112 328 L112 184 Z" />
    <path id="hex-inner" d="M256 144 L352 200 L352 312 L256 368 L160 312 L160 200 Z" />
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="#0a0a0a" />

  <!-- 网格背景 -->
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- 径向光晕 -->
  <ellipse cx="400" cy="315" rx="500" ry="350" fill="url(#radial-glow)" />

  <!-- 左侧：Logo图标 -->
  <g transform="translate(120, 80) scale(0.55)">
    <rect width="512" height="512" fill="#0a0a0a" rx="80" opacity="0.5" />
    <use href="#hex-outer" fill="none" stroke="url(#grad-hero)" stroke-width="8" stroke-linejoin="round" filter="url(#glow)" />
    <use href="#hex-mid" fill="none" stroke="#4f46e5" stroke-width="4" stroke-linejoin="round" opacity="0.6" />
    <use href="#hex-inner" fill="none" stroke="#6366f1" stroke-width="3" stroke-linejoin="round" opacity="0.4" />
    <path d="M180 340 L340 180" stroke="url(#grad-break)" stroke-width="14" stroke-linecap="round" filter="url(#glow)" />
    <path d="M180 340 L340 180" stroke="#c7d2fe" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <g transform="translate(256, 260)">
      <rect x="-28" y="-8" width="56" height="44" rx="8" fill="none" stroke="#818cf8" stroke-width="5" />
      <path d="M-20 -8 L-20 -28 A20 20 0 0 1 20 -28 L20 -8" fill="none" stroke="#818cf8" stroke-width="5" stroke-linecap="round" />
      <circle cx="0" cy="14" r="6" fill="#a5b4fc" />
      <rect x="-3" y="14" width="6" height="12" rx="2" fill="#a5b4fc" />
    </g>
    <circle cx="256" cy="48" r="5" fill="#818cf8" opacity="0.8" />
    <circle cx="256" cy="464" r="5" fill="#818cf8" opacity="0.8" />
  </g>

  <!-- 右侧：标题与信息 -->
  <g transform="translate(480, 0)">
    <!-- 主标题 -->
    <text x="0" y="200" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="700" fill="#f0f0f0" letter-spacing="-2">Overstep<tspan fill="#818cf8">Lab</tspan></text>

    <!-- 副标题 -->
    <text x="0" y="250" font-family="'JetBrains Mono', monospace" font-size="28" font-weight="500" fill="#a5b4fc" letter-spacing="2">越权测试靶场</text>

    <!-- 装饰线 -->
    <line x1="0" y1="275" x2="300" y2="275" stroke="#4f46e5" stroke-width="3" opacity="0.6" />

    <!-- 漏洞类别标签 -->
    <g transform="translate(0, 310)">
      <!-- 水平越权 -->
      <rect x="0" y="0" width="160" height="40" rx="8" fill="rgba(79,70,229,0.15)" stroke="#4f46e5" stroke-width="1.5" />
      <text x="80" y="26" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#818cf8">水平越权 IDOR</text>

      <!-- 垂直越权 -->
      <rect x="180" y="0" width="160" height="40" rx="8" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1.5" />
      <text x="260" y="26" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#fbbf24">垂直越权</text>

      <!-- 上下文越权 -->
      <rect x="360" y="0" width="160" height="40" rx="8" fill="rgba(239,68,68,0.12)" stroke="#ef4444" stroke-width="1.5" />
      <text x="440" y="26" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#fb7185">上下文越权</text>
    </g>

    <!-- 特性列表 -->
    <g transform="translate(0, 380)">
      <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="500" fill="#9ca3af">> 13 个真实漏洞场景</text>
      <text x="0" y="30" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="500" fill="#9ca3af">> 安全 / 漏洞模式一键切换</text>
      <text x="0" y="60" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="500" fill="#9ca3af">> 渐进式提示 + 完整 WriteUp</text>
      <text x="0" y="90" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="500" fill="#9ca3af">> Go + Vue3 单二进制部署</text>
    </g>
  </g>

  <!-- 二进制装饰（右侧边缘） -->
  <g transform="translate(1080, 0)" opacity="0.08">
    <text x="0" y="40" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01001111 01110110</text>
    <text x="0" y="60" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01100101 01110010</text>
    <text x="0" y="80" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01110011 01110100</text>
    <text x="0" y="100" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01100101 01110000</text>
    <text x="0" y="120" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01001100 01100001</text>
    <text x="0" y="140" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01100010 00110001</text>
    <text x="0" y="160" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">00110011 00110000</text>
    <text x="0" y="180" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">00100000 01101000</text>
    <text x="0" y="200" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01101111 01110010</text>
    <text x="0" y="220" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01101001 01111010</text>
    <text x="0" y="240" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01101111 01101110</text>
    <text x="0" y="260" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01110100 01100001</text>
    <text x="0" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01101100 00100000</text>
    <text x="0" y="300" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01110110 01100101</text>
    <text x="0" y="320" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01110010 01110100</text>
    <text x="0" y="340" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01101001 01100011</text>
    <text x="0" y="360" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01100001 01101100</text>
    <text x="0" y="380" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">00100000 01100101</text>
    <text x="0" y="400" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01110011 01100011</text>
    <text x="0" y="420" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01100001 01101100</text>
    <text x="0" y="440" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01100001 01110100</text>
    <text x="0" y="460" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01101001 01101111</text>
    <text x="0" y="480" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01101110 00100000</text>
    <text x="0" y="500" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01100011 01101111</text>
    <text x="0" y="520" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01101110 01110100</text>
    <text x="0" y="540" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01100101 01111000</text>
    <text x="0" y="560" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01110100 00100000</text>
    <text x="0" y="580" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01100011 01101111</text>
    <text x="0" y="600" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01101110 01110100</text>
    <text x="0" y="620" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6366f1">01100101 01111000</text>
  </g>

  <!-- 底部信息栏 -->
  <rect x="0" y="580" width="1200" height="50" fill="#0c0c0c" opacity="0.8" />
  <text x="600" y="610" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="500" fill="#6366f1">13 个真实漏洞场景 | 仅供安全研究与学习使用 | MIT License</text>

  <!-- 左侧底部装饰线 -->
  <line x1="40" y1="600" x2="200" y2="600" stroke="#4f46e5" stroke-width="1" opacity="0.3" />
  <line x1="1000" y1="600" x2="1160" y2="600" stroke="#4f46e5" stroke-width="1" opacity="0.3" />
</svg>
