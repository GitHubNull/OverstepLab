<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-labelledby="poster-title poster-desc">
  <title id="poster-title">OverstepLab Square Poster</title>
  <desc id="poster-desc">OverstepLab 方形宣传海报 1080x1080，适用于Instagram/小红书</desc>

  <defs>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-break" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="radial-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0" />
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(99,102,241,0.08)" stroke-width="1" />
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <path id="hex-outer" d="M256 48 L448 160 L448 352 L256 464 L64 352 L64 160 Z" />
    <path id="hex-mid" d="M256 96 L400 184 L400 328 L256 416 L112 328 L112 184 Z" />
    <path id="hex-inner" d="M256 144 L352 200 L352 312 L256 368 L160 312 L160 200 Z" />
  </defs>

  <rect width="1080" height="1080" fill="#0a0a0a" />
  <rect width="1080" height="1080" fill="url(#grid)" />
  <ellipse cx="540" cy="400" rx="500" ry="400" fill="url(#radial-glow)" />

  <!-- 中央Logo -->
  <g transform="translate(284, 120) scale(1.0)">
    <rect width="512" height="512" fill="#0a0a0a" rx="80" opacity="0.5" />
    <use href="#hex-outer" fill="none" stroke="url(#grad-hero)" stroke-width="8" stroke-linejoin="round" filter="url(#glow)" />
    <use href="#hex-mid" fill="none" stroke="#4f46e5" stroke-width="4" stroke-linejoin="round" opacity="0.6" />
    <use href="#hex-inner" fill="none" stroke="#6366f1" stroke-width="3" stroke-linejoin="round" opacity="0.4" />
    <path d="M180 340 L340 180" stroke="url(#grad-break)" stroke-width="14" stroke-linecap="round" filter="url(#glow)" />
    <path d="M180 340 L340 180" stroke="#c7d2fe" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <g transform="translate(256, 260)">
      <rect x="-28" y="-8" width="56" height="44" rx="8" fill="none" stroke="#818cf8" stroke-width="5" />
      <path d="M-20 -8 L-20 -28 A20 20 0 0 1 20 -28 L20 -8" fill="none" stroke="#818cf8" stroke-width="5" stroke-linecap="round" />
      <circle cx="0" cy="14" r="6" fill="#a5b4fc" />
      <rect x="-3" y="14" width="6" height="12" rx="2" fill="#a5b4fc" />
    </g>
    <circle cx="256" cy="48" r="5" fill="#818cf8" opacity="0.8" />
    <circle cx="256" cy="464" r="5" fill="#818cf8" opacity="0.8" />
  </g>

  <!-- 标题 -->
  <g transform="translate(540, 720)" text-anchor="middle">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="72" font-weight="700" fill="#f0f0f0" letter-spacing="-2">Overstep<tspan fill="#818cf8">Lab</tspan></text>
    <text x="0" y="50" font-family="'JetBrains Mono', monospace" font-size="28" font-weight="500" fill="#a5b4fc" letter-spacing="4">越权测试靶场</text>
  </g>

  <!-- 标签 -->
  <g transform="translate(540, 810)" text-anchor="middle">
    <rect x="-240" y="0" width="160" height="44" rx="8" fill="rgba(79,70,229,0.15)" stroke="#4f46e5" stroke-width="1.5" />
    <text x="-160" y="28" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#818cf8">水平越权</text>

    <rect x="-80" y="0" width="160" height="44" rx="8" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1.5" />
    <text x="0" y="28" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#fbbf24">垂直越权</text>

    <rect x="80" y="0" width="160" height="44" rx="8" fill="rgba(239,68,68,0.12)" stroke="#ef4444" stroke-width="1.5" />
    <text x="160" y="28" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#fb7185">上下文越权</text>
  </g>

  <!-- 底部信息 -->
  <rect x="140" y="920" width="800" height="50" rx="12" fill="#0c0c0c" opacity="0.8" />
  <text x="540" y="952" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="500" fill="#6366f1">13 个真实漏洞场景 | 仅供安全研究与学习使用</text>

  <!-- 装饰边框 -->
  <rect x="40" y="40" width="1000" height="1000" rx="20" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.15" />
</svg>
