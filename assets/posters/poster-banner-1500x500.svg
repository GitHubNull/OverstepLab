<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" role="img" aria-labelledby="poster-title poster-desc">
  <title id="poster-title">OverstepLab GitHub Banner</title>
  <desc id="poster-desc">OverstepLab GitHub仓库顶部横幅 1500x500</desc>

  <defs>
    <linearGradient id="grad-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-break" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="radial-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0" />
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(99,102,241,0.06)" stroke-width="1" />
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <path id="hex-outer" d="M256 48 L448 160 L448 352 L256 464 L64 352 L64 160 Z" />
    <path id="hex-mid" d="M256 96 L400 184 L400 328 L256 416 L112 328 L112 184 Z" />
    <path id="hex-inner" d="M256 144 L352 200 L352 312 L256 368 L160 312 L160 200 Z" />
  </defs>

  <rect width="1500" height="500" fill="#0a0a0a" />
  <rect width="1500" height="500" fill="url(#grid)" />
  <ellipse cx="400" cy="250" rx="600" ry="300" fill="url(#radial-glow)" />

  <!-- 左侧Logo -->
  <g transform="translate(80, 20) scale(0.45)">
    <rect width="512" height="512" fill="#0a0a0a" rx="80" opacity="0.5" />
    <use href="#hex-outer" fill="none" stroke="url(#grad-hero)" stroke-width="8" stroke-linejoin="round" filter="url(#glow)" />
    <use href="#hex-mid" fill="none" stroke="#4f46e5" stroke-width="4" stroke-linejoin="round" opacity="0.6" />
    <use href="#hex-inner" fill="none" stroke="#6366f1" stroke-width="3" stroke-linejoin="round" opacity="0.4" />
    <path d="M180 340 L340 180" stroke="url(#grad-break)" stroke-width="14" stroke-linecap="round" filter="url(#glow)" />
    <path d="M180 340 L340 180" stroke="#c7d2fe" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <g transform="translate(256, 260)">
      <rect x="-28" y="-8" width="56" height="44" rx="8" fill="none" stroke="#818cf8" stroke-width="5" />
      <path d="M-20 -8 L-20 -28 A20 20 0 0 1 20 -28 L20 -8" fill="none" stroke="#818cf8" stroke-width="5" stroke-linecap="round" />
      <circle cx="0" cy="14" r="6" fill="#a5b4fc" />
      <rect x="-3" y="14" width="6" height="12" rx="2" fill="#a5b4fc" />
    </g>
    <circle cx="256" cy="48" r="5" fill="#818cf8" opacity="0.8" />
    <circle cx="256" cy="464" r="5" fill="#818cf8" opacity="0.8" />
  </g>

  <!-- 右侧文字 -->
  <g transform="translate(350, 0)">
    <text x="0" y="180" font-family="'Inter', sans-serif" font-size="80" font-weight="700" fill="#f0f0f0" letter-spacing="-2">Overstep<tspan fill="#818cf8">Lab</tspan></text>
    <text x="0" y="230" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="500" fill="#a5b4fc" letter-spacing="3">越权测试靶场</text>
    <line x1="0" y1="255" x2="350" y2="255" stroke="#4f46e5" stroke-width="3" opacity="0.5" />

    <text x="0" y="300" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="500" fill="#9ca3af">13 个真实漏洞场景 | 水平越权 | 垂直越权 | 上下文越权</text>
    <text x="0" y="340" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="500" fill="#6b7280">Go + Gin + Vue3 + PrimeVue | 单二进制部署 | MIT License</text>
  </g>

  <!-- 右侧装饰标签 -->
  <g transform="translate(1200, 100)">
    <rect x="0" y="0" width="120" height="32" rx="6" fill="rgba(79,70,229,0.15)" stroke="#4f46e5" stroke-width="1" />
    <text x="60" y="21" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#818cf8">IDOR</text>
    <rect x="0" y="48" width="120" height="32" rx="6" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1" />
    <text x="60" y="69" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#fbbf24">Vertical</text>
    <rect x="0" y="96" width="120" height="32" rx="6" fill="rgba(239,68,68,0.12)" stroke="#ef4444" stroke-width="1" />
    <text x="60" y="117" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#fb7185">Context</text>
  </g>

  <!-- 底部信息 -->
  <rect x="0" y="460" width="1500" height="40" fill="#0c0c0c" opacity="0.8" />
  <text x="750" y="485" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="500" fill="#6366f1">仅供安全研究与学习使用</text>
</svg>
