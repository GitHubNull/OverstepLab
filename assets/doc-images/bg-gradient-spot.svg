<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" role="img" aria-labelledby="bg-title bg-desc">
  <title id="bg-title">Gradient Spot Divider</title>
  <desc id="bg-desc">径向渐变光斑分隔装饰，用于文档章节分隔</desc>

  <defs>
    <linearGradient id="grad-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#4f46e5;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#4f46e5;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0" />
    </linearGradient>

    <radialGradient id="spot-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0" />
    </radialGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="200" fill="#0a0a0a" />
  <ellipse cx="400" cy="100" rx="300" ry="60" fill="url(#spot-glow)" />
  <line x1="100" y1="100" x2="700" y2="100" stroke="url(#grad-line)" stroke-width="2" filter="url(#glow)" />

  <!-- 中心装饰点 -->
  <circle cx="400" cy="100" r="4" fill="#818cf8" filter="url(#glow)" />
  <circle cx="400" cy="100" r="2" fill="#c7d2fe" />
</svg>
