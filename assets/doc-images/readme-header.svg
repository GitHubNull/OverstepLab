<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-labelledby="header-title header-desc">
  <title id="header-title">OverstepLab README Header</title>
  <desc id="header-desc">OverstepLab README文档顶部头图，简洁专业风格</desc>

  <defs>
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-break" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="radial-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0" />
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(99,102,241,0.06)" stroke-width="1" />
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <path id="hex-outer" d="M256 48 L448 160 L448 352 L256 464 L64 352 L64 160 Z" />
    <path id="hex-mid" d="M256 96 L400 184 L400 328 L256 416 L112 328 L112 184 Z" />
    <path id="hex-inner" d="M256 144 L352 200 L352 312 L256 368 L160 312 L160 200 Z" />
  </defs>

  <rect width="1200" height="400" fill="#0a0a0a" />
  <rect width="1200" height="400" fill="url(#grid)" />
  <ellipse cx="300" cy="200" rx="400" ry="250" fill="url(#radial-glow)" />

  <!-- 左侧Logo -->
  <g transform="translate(60, 20) scale(0.35)">
    <rect width="512" height="512" fill="#0a0a0a" rx="80" opacity="0.5" />
    <use href="#hex-outer" fill="none" stroke="url(#grad-primary)" stroke-width="8" stroke-linejoin="round" filter="url(#glow)" />
    <use href="#hex-mid" fill="none" stroke="#4f46e5" stroke-width="4" stroke-linejoin="round" opacity="0.6" />
    <use href="#hex-inner" fill="none" stroke="#6366f1" stroke-width="3" stroke-linejoin="round" opacity="0.4" />
    <path d="M180 340 L340 180" stroke="url(#grad-break)" stroke-width="14" stroke-linecap="round" filter="url(#glow)" />
    <path d="M180 340 L340 180" stroke="#c7d2fe" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <g transform="translate(256, 260)">
      <rect x="-28" y="-8" width="56" height="44" rx="8" fill="none" stroke="#818cf8" stroke-width="5" />
      <path d="M-20 -8 L-20 -28 A20 20 0 0 1 20 -28 L20 -8" fill="none" stroke="#818cf8" stroke-width="5" stroke-linecap="round" />
      <circle cx="0" cy="14" r="6" fill="#a5b4fc" />
      <rect x="-3" y="14" width="6" height="12" rx="2" fill="#a5b4fc" />
    </g>
    <circle cx="256" cy="48" r="5" fill="#818cf8" opacity="0.8" />
    <circle cx="256" cy="464" r="5" fill="#818cf8" opacity="0.8" />
  </g>

  <!-- 右侧文字 -->
  <g transform="translate(260, 0)">
    <text x="0" y="160" font-family="'Inter', sans-serif" font-size="64" font-weight="700" fill="#f0f0f0" letter-spacing="-2">Overstep<tspan fill="#818cf8">Lab</tspan></text>
    <text x="0" y="200" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="500" fill="#a5b4fc" letter-spacing="3">越权测试靶场</text>
    <line x1="0" y1="220" x2="280" y2="220" stroke="#4f46e5" stroke-width="2" opacity="0.5" />
    <text x="0" y="260" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="500" fill="#9ca3af">13 个真实漏洞场景 | 水平越权 | 垂直越权 | 上下文越权</text>
    <text x="0" y="290" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="500" fill="#6b7280">Go + Gin + Vue3 + PrimeVue | 单二进制部署 | 仅供安全研究</text>
  </g>

  <!-- 右侧技术标签 -->
  <g transform="translate(950, 120)">
    <rect x="0" y="0" width="80" height="28" rx="6" fill="rgba(79,70,229,0.15)" stroke="#4f46e5" stroke-width="1" />
    <text x="40" y="19" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#818cf8">Go</text>
    <rect x="90" y="0" width="80" height="28" rx="6" fill="rgba(79,70,229,0.15)" stroke="#4f46e5" stroke-width="1" />
    <text x="130" y="19" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#818cf8">Vue3</text>
    <rect x="0" y="40" width="80" height="28" rx="6" fill="rgba(79,70,229,0.15)" stroke="#4f46e5" stroke-width="1" />
    <text x="40" y="59" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#818cf8">Gin</text>
    <rect x="90" y="40" width="80" height="28" rx="6" fill="rgba(79,70,229,0.15)" stroke="#4f46e5" stroke-width="1" />
    <text x="130" y="59" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#818cf8">JWT</text>
    <rect x="0" y="80" width="80" height="28" rx="6" fill="rgba(79,70,229,0.15)" stroke="#4f46e5" stroke-width="1" />
    <text x="40" y="99" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#818cf8">SQLite</text>
    <rect x="90" y="80" width="80" height="28" rx="6" fill="rgba(79,70,229,0.15)" stroke="#4f46e5" stroke-width="1" />
    <text x="130" y="99" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#818cf8">Docker</text>
  </g>

  <!-- 底部信息栏 -->
  <rect x="0" y="360" width="1200" height="40" fill="#0c0c0c" opacity="0.8" />
  <text x="600" y="385" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="500" fill="#6366f1">MIT License | 仅供安全研究与学习使用</text>
</svg>
