<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-labelledby="bg-title bg-desc">
  <title id="bg-title">Shield Pattern Watermark</title>
  <desc id="bg-desc">抽象盾牌水印装饰图案，低透明度，用于文档背景水印</desc>

  <defs>
    <path id="shield" d="M200 40 L360 120 L360 260 Q360 340 200 380 Q40 340 40 260 L40 120 Z" />
    <path id="hex-small" d="M200 80 L280 130 L280 230 L200 280 L120 230 L120 130 Z" />
  </defs>

  <rect width="400" height="400" fill="#0a0a0a" />

  <!-- 主盾牌轮廓 -->
  <use href="#shield" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.06" />
  <use href="#hex-small" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.04" />

  <!-- 突破线 -->
  <line x1="120" y1="280" x2="280" y2="120" stroke="#818cf8" stroke-width="3" opacity="0.05" stroke-linecap="round" />

  <!-- 装饰六边形阵列 -->
  <g opacity="0.03">
    <path d="M60 60 L90 80 L90 120 L60 140 L30 120 L30 80 Z" fill="none" stroke="#4f46e5" stroke-width="1" />
    <path d="M340 60 L370 80 L370 120 L340 140 L310 120 L310 80 Z" fill="none" stroke="#4f46e5" stroke-width="1" />
    <path d="M60 280 L90 300 L90 340 L60 360 L30 340 L30 300 Z" fill="none" stroke="#4f46e5" stroke-width="1" />
    <path d="M340 280 L370 300 L370 340 L340 360 L310 340 L310 300 Z" fill="none" stroke="#4f46e5" stroke-width="1" />
  </g>
</svg>
